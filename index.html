<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Trystero BitTorrent WebRTC test</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { max-width: 820px; margin: auto; padding: 24px; line-height: 1.45; }
    .card { border: 1px solid #8888; border-radius: 12px; padding: 16px; margin: 14px 0; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    input, button { font: inherit; padding: 9px 11px; border: 1px solid #8888; border-radius: 8px; }
    input { flex: 1 1 280px; }
    button { cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #log { white-space: pre-wrap; overflow-wrap: anywhere; max-height: 360px; overflow: auto;
           font: 13px/1.45 ui-monospace, monospace; background: #8881; padding: 12px; border-radius: 8px; }
    .ok { color: #28a65a; font-weight: 700; }
    .bad { color: #d44; font-weight: 700; }
    code { overflow-wrap: anywhere; }
  </style>
</head>
<body>
  <h1>GitHub Pages WebRTC test</h1>
  <p>
    This version uses <strong>Trystero's BitTorrent strategy</strong>, which handles
    tracker announces, WebRTC offers/answers, retries, room namespacing, and data channels.
  </p>

  <section class="card">
    <div class="row">
      <button id="create">Create room</button>
      <input id="roomInput" placeholder="Room code">
      <button id="join">Join room</button>
    </div>
    <p class="row">
      <input id="shareUrl" readonly placeholder="Share URL">
      <button id="copy" disabled>Copy</button>
    </p>
  </section>

  <section class="card">
    <div>Status: <span id="status">idle</span></div>
    <div>Room: <code id="roomName">—</code></div>
    <div>Peers: <strong id="peerCount">0</strong></div>
    <div>Open tracker sockets: <strong id="socketCount">0</strong></div>
  </section>

  <section class="card">
    <div class="row">
      <input id="message" placeholder="Message" disabled>
      <button id="send" disabled>Send</button>
    </div>
    <div id="messages"></div>
  </section>

  <section class="card">
    <h2>Diagnostics</h2>
    <div id="log"></div>
  </section>

  <script type="module">
    const ui = id => document.getElementById(id);
    const log = text => {
      ui('log').textContent += `[${new Date().toLocaleTimeString()}] ${text}\n`;
      ui('log').scrollTop = ui('log').scrollHeight;
    };

    window.addEventListener('error', e => log(`WINDOW ERROR: ${e.message}`));
    window.addEventListener('unhandledrejection', e =>
      log(`UNHANDLED PROMISE: ${e.reason?.stack || e.reason}`)
    );

    let joinRoom, getRelaySockets;
    try {
      ({ joinRoom, getRelaySockets } =
        await import('https://esm.run/@trystero-p2p/torrent@0.25.2'));
      log('Loaded @trystero-p2p/torrent 0.25.2.');
    } catch (error) {
      ui('status').textContent = 'module load failed';
      ui('status').className = 'bad';
      log(`MODULE LOAD FAILED: ${error?.stack || error}`);
      throw error;
    }

    let room = null;
    let messageAction = null;
    const peers = new Set();
    let socketTimer = null;

    const makeCode = () =>
      [...crypto.getRandomValues(new Uint8Array(16))]
        .map(x => x.toString(16).padStart(2, '0')).join('');

    function setStatus(text, good = false, bad = false) {
      ui('status').textContent = text;
      ui('status').className = good ? 'ok' : bad ? 'bad' : '';
    }

    function refreshPeerUi() {
      ui('peerCount').textContent = peers.size;
      const connected = peers.size > 0;
      ui('message').disabled = !connected;
      ui('send').disabled = !connected;
      if (connected) setStatus('connected', true);
    }

    function inspectSockets() {
      const sockets = getRelaySockets?.() || {};
      let open = 0;
      for (const [url, ws] of Object.entries(sockets)) {
        const states = ['CONNECTING', 'OPEN', 'CLOSING', 'CLOSED'];
        const state = states[ws.readyState] || String(ws.readyState);
        if (ws.readyState === WebSocket.OPEN) open++;
        if (ws.__lastLoggedState !== state) {
          ws.__lastLoggedState = state;
          log(`Tracker socket ${url}: ${state}`);
        }
      }
      ui('socketCount').textContent = open;
      if (!peers.size) {
        if (open > 0) setStatus('waiting for peer');
        else setStatus('connecting to trackers…');
      }
    }

    function addMessage(label, text) {
      const p = document.createElement('p');
      const b = document.createElement('strong');
      b.textContent = `${label}: `;
      p.append(b, document.createTextNode(String(text)));
      ui('messages').appendChild(p);
    }

    function leaveCurrentRoom() {
      clearInterval(socketTimer);
      socketTimer = null;
      if (room) {
        try { room.leave(); } catch (e) { log(`Leave error: ${e.message}`); }
      }
      room = null;
      messageAction = null;
      peers.clear();
      refreshPeerUi();
    }

    function enterRoom(rawCode) {
      const code = rawCode.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
      if (!code) return alert('Enter a room code.');

      leaveCurrentRoom();

      ui('roomInput').value = code;
      ui('roomName').textContent = code;
      const url = new URL(location.href);
      url.hash = `room=${encodeURIComponent(code)}`;
      history.replaceState(null, '', url);
      ui('shareUrl').value = url.href;
      ui('copy').disabled = false;

      setStatus('joining room…');
      log(`Joining room "${code}".`);

      try {
        room = joinRoom(
          {
            appId: 'github-pages-dittle-webrtc-test-v2',
            relayConfig: { redundancy: 5 },
            trickleIce: true
          },
          code,
          {
            onJoinError: (error, peerId) =>
              log(`JOIN ERROR with ${peerId || 'unknown peer'}: ${error?.message || error}`)
          }
        );

        messageAction = room.makeAction('message');

        room.onPeerJoin = peerId => {
          peers.add(peerId);
          log(`PEER JOINED: ${peerId}`);
          refreshPeerUi();
          messageAction.send('Automatic hello from the other browser.', { target: peerId });
        };

        room.onPeerLeave = peerId => {
          peers.delete(peerId);
          log(`PEER LEFT: ${peerId}`);
          refreshPeerUi();
          if (!peers.size) setStatus('waiting for peer');
        };

        messageAction.onMessage = (data, { peerId }) => {
          addMessage(`Peer ${peerId.slice(0, 8)}`, data);
          log(`Received message from ${peerId}.`);
        };

        socketTimer = setInterval(inspectSockets, 1000);
        inspectSockets();
      } catch (error) {
        setStatus('join failed', false, true);
        log(`JOIN FAILED: ${error?.stack || error}`);
      }
    }

    ui('create').onclick = () => enterRoom(makeCode());
    ui('join').onclick = () => enterRoom(ui('roomInput').value);
    ui('roomInput').onkeydown = e => { if (e.key === 'Enter') enterRoom(e.target.value); };

    ui('copy').onclick = async () => {
      await navigator.clipboard.writeText(ui('shareUrl').value);
      ui('copy').textContent = 'Copied';
      setTimeout(() => ui('copy').textContent = 'Copy', 1000);
    };

    function send() {
      const text = ui('message').value.trim();
      if (!text || !messageAction || !peers.size) return;
      messageAction.send(text);
      addMessage('You', text);
      log(`Sent message to ${peers.size} peer(s).`);
      ui('message').value = '';
    }

    ui('send').onclick = send;
    ui('message').onkeydown = e => { if (e.key === 'Enter') send(); };

    const initial = new URLSearchParams(location.hash.slice(1)).get('room');
    if (initial) enterRoom(initial);
    else log('Ready. Create a room, then open its URL in another browser/device.');
  </script>
</body>
</html>
